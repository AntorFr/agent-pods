<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Alfred</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0B0E14">
  <link rel="stylesheet" href="/static/engine.css">
  <link rel="stylesheet" href="/static/launcher.css">
</head>
<body>
  <div id="shell">
    <section id="rail">
      <header id="rail-head">
        <button class="blason" id="home" title="Accueil">A</button>
        <span class="name">Alfred</span>
        <span class="spacer"></span>
        <select id="model" title="Modèle"></select>
        <span id="rail-status" title="État"></span>
        <button class="icon-btn" id="vsc" title="Tunnel VS Code">⧉</button>
        <button class="icon-btn" id="reset" title="Nouvelle session">↺</button>
      </header>
      <main id="chat"></main>
      <div id="queued"></div>
      <form id="composer">
        <button class="icon-btn" id="shield" type="button" title="Autoriser la prochaine action sensible (agenda…)">🛡</button>
        <textarea id="input" rows="1" placeholder="Écrire à Alfred…" autocomplete="off"></textarea>
        <button id="send" type="submit" title="Envoyer">↑</button>
      </form>
    </section>

    <div id="gutter" title="Glisser pour redimensionner"></div>

    <section id="canvas">
      <div id="topbar">
        <nav id="crumbs"></nav>
        <span class="spacer"></span>
        <button class="icon-btn" id="theme" title="Thème clair/sombre">◐</button>
      </div>
      <div id="page"></div>
    </section>
  </div>

  <div class="modal" id="tunnel-modal" hidden>
    <div class="card">
      <h2>Tunnel VS Code</h2>
      <div id="tunnel-body"><div class="placeholder">chargement…</div></div>
      <div class="actions">
        <button id="tunnel-refresh">⟳ Rafraîchir</button>
        <button id="tunnel-close">Fermer</button>
      </div>
    </div>
  </div>

  <script src="/static/vendor/marked.min.js"></script>
  <script src="/static/vendor/purify.min.js"></script>
  <script src="/static/engine.js"></script>
  <script src="/static/launcher.js"></script>
</body>
</html>
