<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1c1c1e">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/static/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/static/icon.svg">
<title>Alfred</title>
<style>
  :root {
    --bg: #f5f5f7; --fg: #1c1c1e; --card: #ffffff; --muted: #8e8e93;
    --accent: #3a5a40; --accent-fg: #ffffff; --border: #e5e5ea;
    --code-bg: #ececf0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e; --fg: #f5f5f7; --card: #2c2c2e; --muted: #8e8e93;
      --accent: #74a57f; --accent-fg: #10141a; --border: #3a3a3c;
      --code-bg: #1c1c1e;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    font: 16px/1.5 -apple-system, system-ui, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; flex-direction: column;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  header {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  header h1 { font-size: 17px; font-weight: 600; flex: 1; }
  header button {
    background: none; border: none; color: var(--muted);
    font-size: 14px; cursor: pointer; padding: 4px 8px;
  }
  #model {
    background: var(--card); color: var(--muted); border: 1px solid var(--border);
    border-radius: 12px; font: 13px -apple-system, system-ui, sans-serif;
    padding: 4px 8px; outline: none; max-width: 110px;
  }
  #status { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  #status.busy { background: #ff9f0a; }
  main { flex: 1; overflow-y: auto; padding: 16px; scroll-behavior: smooth; }
  .msg {
    max-width: 85%; padding: 10px 14px; border-radius: 18px;
    margin-bottom: 8px; overflow-wrap: break-word;
  }
  .msg.user {
    background: var(--accent); color: var(--accent-fg); margin-left: auto;
    border-bottom-right-radius: 4px; white-space: pre-wrap;
  }
  .msg.agent { background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.error { background: #b0323255; border: 1px solid #b03232; white-space: pre-wrap; }

  /* Rendered markdown inside agent bubbles */
  .msg.agent > :not(:last-child) { margin-bottom: .6em; }
  .msg.agent h1, .msg.agent h2, .msg.agent h3, .msg.agent h4 {
    font-size: 1.05em; line-height: 1.3; margin-top: .4em;
  }
  .msg.agent ul, .msg.agent ol { padding-left: 1.4em; }
  .msg.agent li + li { margin-top: .2em; }
  .msg.agent blockquote {
    border-left: 3px solid var(--border); padding-left: .8em; color: var(--muted);
  }
  .msg.agent a { color: var(--accent); }
  .msg.agent hr { border: none; border-top: 1px solid var(--border); }
  .msg.agent code {
    font: .85em ui-monospace, SFMono-Regular, Menlo, monospace;
    background: var(--code-bg); border-radius: 4px; padding: .1em .35em;
  }
  .msg.agent pre {
    background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; overflow-x: auto;
  }
  .msg.agent pre code { background: none; padding: 0; }
  .msg.agent table {
    border-collapse: collapse; display: block; overflow-x: auto;
    font-size: .9em; max-width: 100%;
  }
  .msg.agent th, .msg.agent td {
    border: 1px solid var(--border); padding: 4px 8px; text-align: left;
  }
  .msg.agent th { background: var(--code-bg); }

  /* Typing indicator: three pulsing dots while the agent works */
  .typing { display: inline-flex; gap: 5px; padding: 4px 0; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
    animation: pulse 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse {
    0%, 60%, 100% { opacity: .25; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-3px); }
  }

  form {
    display: flex; gap: 8px; padding: 12px 16px;
    border-top: 1px solid var(--border); flex-shrink: 0;
  }
  textarea {
    flex: 1; resize: none; border: 1px solid var(--border); border-radius: 20px;
    padding: 10px 14px; font: inherit; background: var(--card); color: var(--fg);
    max-height: 120px; outline: none;
  }
  form button {
    border: none; border-radius: 50%; width: 42px; height: 42px; flex-shrink: 0;
    background: var(--accent); color: var(--accent-fg); font-size: 18px;
    cursor: pointer; align-self: flex-end;
  }
  form button:disabled { opacity: .4; }
</style>
</head>
<body>
<header>
  <div id="status"></div>
  <h1>Alfred</h1>
  <select id="model" title="Modèle"></select>
  <button id="reset" title="Nouvelle session">↺</button>
</header>
<main id="chat"></main>
<form id="form">
  <textarea id="input" rows="1" placeholder="Message…" autocomplete="off"></textarea>
  <button id="send" type="submit">↑</button>
</form>
<script src="/static/vendor/marked.min.js"></script>
<script src="/static/vendor/purify.min.js"></script>
<script>
const chat = document.getElementById('chat');
const form = document.getElementById('form');
const input = document.getElementById('input');
const send = document.getElementById('send');
const status = document.getElementById('status');
const modelSel = document.getElementById('model');

let token = localStorage.getItem('gw_token') || '';
let oidcEnabled = false;
fetch('/api/auth/config').then(r => r.json())
  .then(c => { oidcEnabled = c.oidcEnabled; }).catch(() => {});

// Model picker: "Auto" (server default) + the gateway's configured list.
const savedModel = localStorage.getItem('gw_model') || '';
modelSel.add(new Option('Auto', ''));
fetch('/api/models').then(r => r.json()).then(({ models }) => {
  for (const m of models) modelSel.add(new Option(m.label, m.id));
  if ([...modelSel.options].some(o => o.value === savedModel)) modelSel.value = savedModel;
}).catch(() => {});
modelSel.addEventListener('change', () => localStorage.setItem('gw_model', modelSel.value));

marked.setOptions({ gfm: true, breaks: true });

function headers(json) {
  const h = {};
  if (json) h['Content-Type'] = 'application/json';
  // Bearer fallback only without SSO (dev mode); with OIDC the session
  // cookie does the work.
  if (!oidcEnabled && token) h['Authorization'] = 'Bearer ' + token;
  return h;
}

function onUnauthorized() {
  if (oidcEnabled) { window.location = '/auth/login'; return true; }
  return false;
}

function add(cls, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  if (cls === 'agent') el.innerHTML = DOMPurify.sanitize(marked.parse(text));
  else el.textContent = text;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

function addTyping() {
  const el = document.createElement('div');
  el.className = 'msg agent';
  el.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

async function askToken() {
  token = prompt('Jeton d’accès :') || '';
  localStorage.setItem('gw_token', token);
}

async function sendMessage(text) {
  add('user', text);
  const pending = addTyping();
  status.classList.add('busy');
  send.disabled = true;
  try {
    const res = await fetch('/api/chat', {
      method: 'POST', headers: headers(true),
      body: JSON.stringify({ message: text, model: modelSel.value || undefined }),
    });
    if (res.status === 401) { pending.remove(); if (!onUnauthorized()) await askToken(); return; }
    if (!res.ok) throw new Error((await res.json()).detail || res.status);
    // Parse the SSE stream by hand (EventSource can't POST). The typing
    // bubble stays up until the first text arrives (agent may run tools
    // for a while before answering), then between intermediate texts.
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      let idx;
      while ((idx = buf.indexOf('\n\n')) >= 0) {
        const raw = buf.slice(0, idx); buf = buf.slice(idx + 2);
        const ev = /^event: (.*)$/m.exec(raw)?.[1];
        const data = JSON.parse(/^data: (.*)$/m.exec(raw)?.[1] || '{}');
        if (ev === 'text') { add('agent', data.text); chat.appendChild(pending); chat.scrollTop = chat.scrollHeight; }
        else if (ev === 'error') add('error', data.message);
      }
    }
  } catch (e) {
    add('error', String(e));
  } finally {
    pending.remove();
    status.classList.remove('busy');
    send.disabled = false;
  }
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  sendMessage(text);
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

document.getElementById('reset').addEventListener('click', async () => {
  if (!confirm('Repartir sur une session vierge ?')) return;
  await fetch('/api/reset', { method: 'POST', headers: headers(false) });
  chat.innerHTML = '';
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
</body>
</html>
