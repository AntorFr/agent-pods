<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1c1c1e">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/static/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/static/icon.svg">
<title>Alfred</title>
<style>
  :root {
    --bg: #f5f5f7; --fg: #1c1c1e; --card: #ffffff; --muted: #8e8e93;
    --accent: #3a5a40; --accent-fg: #ffffff; --border: #e5e5ea;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e; --fg: #f5f5f7; --card: #2c2c2e; --muted: #8e8e93;
      --accent: #74a57f; --accent-fg: #10141a; --border: #3a3a3c;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    font: 16px/1.5 -apple-system, system-ui, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; flex-direction: column;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  header {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  header h1 { font-size: 17px; font-weight: 600; flex: 1; }
  header button {
    background: none; border: none; color: var(--muted);
    font-size: 14px; cursor: pointer; padding: 4px 8px;
  }
  #status { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  #status.busy { background: #ff9f0a; }
  main { flex: 1; overflow-y: auto; padding: 16px; scroll-behavior: smooth; }
  .msg {
    max-width: 85%; padding: 10px 14px; border-radius: 18px;
    margin-bottom: 8px; white-space: pre-wrap; overflow-wrap: break-word;
  }
  .msg.user { background: var(--accent); color: var(--accent-fg); margin-left: auto; border-bottom-right-radius: 4px; }
  .msg.agent { background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.error { background: #b0323255; border: 1px solid #b03232; }
  .msg.pending { color: var(--muted); font-style: italic; }
  form {
    display: flex; gap: 8px; padding: 12px 16px;
    border-top: 1px solid var(--border); flex-shrink: 0;
  }
  textarea {
    flex: 1; resize: none; border: 1px solid var(--border); border-radius: 20px;
    padding: 10px 14px; font: inherit; background: var(--card); color: var(--fg);
    max-height: 120px; outline: none;
  }
  form button {
    border: none; border-radius: 50%; width: 42px; height: 42px; flex-shrink: 0;
    background: var(--accent); color: var(--accent-fg); font-size: 18px;
    cursor: pointer; align-self: flex-end;
  }
  form button:disabled { opacity: .4; }
</style>
</head>
<body>
<header>
  <div id="status"></div>
  <h1>Alfred</h1>
  <button id="reset" title="Nouvelle session">↺</button>
</header>
<main id="chat"></main>
<form id="form">
  <textarea id="input" rows="1" placeholder="Message…" autocomplete="off"></textarea>
  <button id="send" type="submit">↑</button>
</form>
<script>
const chat = document.getElementById('chat');
const form = document.getElementById('form');
const input = document.getElementById('input');
const send = document.getElementById('send');
const status = document.getElementById('status');

let token = localStorage.getItem('gw_token') || '';
let oidcEnabled = false;
fetch('/api/auth/config').then(r => r.json())
  .then(c => { oidcEnabled = c.oidcEnabled; }).catch(() => {});

function headers(json) {
  const h = {};
  if (json) h['Content-Type'] = 'application/json';
  // Bearer fallback only without SSO (dev mode); with OIDC the session
  // cookie does the work.
  if (!oidcEnabled && token) h['Authorization'] = 'Bearer ' + token;
  return h;
}

function onUnauthorized() {
  if (oidcEnabled) { window.location = '/auth/login'; return true; }
  return false;
}

function add(cls, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  el.textContent = text;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

async function askToken() {
  token = prompt('Jeton d’accès :') || '';
  localStorage.setItem('gw_token', token);
}

async function sendMessage(text) {
  add('user', text);
  const pending = add('msg agent pending', '…');
  status.classList.add('busy');
  send.disabled = true;
  try {
    const res = await fetch('/api/chat', {
      method: 'POST', headers: headers(true),
      body: JSON.stringify({ message: text }),
    });
    if (res.status === 401) { pending.remove(); if (!onUnauthorized()) await askToken(); return; }
    if (!res.ok) throw new Error((await res.json()).detail || res.status);
    pending.remove();
    // Parse the SSE stream by hand (EventSource can't POST).
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      let idx;
      while ((idx = buf.indexOf('\n\n')) >= 0) {
        const raw = buf.slice(0, idx); buf = buf.slice(idx + 2);
        const ev = /^event: (.*)$/m.exec(raw)?.[1];
        const data = JSON.parse(/^data: (.*)$/m.exec(raw)?.[1] || '{}');
        if (ev === 'text') add('agent', data.text);
        else if (ev === 'error') add('error', data.message);
      }
    }
  } catch (e) {
    pending.remove();
    add('error', String(e));
  } finally {
    status.classList.remove('busy');
    send.disabled = false;
  }
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  sendMessage(text);
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

document.getElementById('reset').addEventListener('click', async () => {
  if (!confirm('Repartir sur une session vierge ?')) return;
  await fetch('/api/reset', { method: 'POST', headers: headers(false) });
  chat.innerHTML = '';
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
</body>
</html>
