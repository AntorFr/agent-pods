<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0f16">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/static/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/static/icon.svg">
<title>Alfred</title>
<style>
  /* ── Batcave: graphite + gold, dark-only, sober ─────────────────── */
  :root {
    --bg: #0b0f16; --panel: #0f141d; --card: #151c28; --card-2: #101722;
    --fg: #d6dde8; --muted: #76839a; --faint: #4a5568;
    --accent: #d9a441; --accent-soft: rgba(217, 164, 65, .13);
    --border: #1e2735; --border-2: #2a3547;
    --user-bubble: #26344a; --danger: #c65f4a; --ok: #6faf7c;
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    font: 15px/1.5 -apple-system, system-ui, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; flex-direction: column;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  button { font: inherit; }
  .hidden { display: none !important; }

  /* ── Header ─────────────────────────────────────────────────────── */
  header {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    background: var(--panel);
  }
  #status { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); flex-shrink: 0; }
  #status.busy { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  header h1 {
    font: 600 13px var(--mono); letter-spacing: .4em; text-transform: uppercase;
    color: var(--accent); flex: 1; padding-left: .1em;
  }
  #model {
    background: var(--card); color: var(--muted); border: 1px solid var(--border-2);
    border-radius: 8px; font: 12px var(--mono); padding: 5px 8px; outline: none;
    max-width: 110px;
  }
  header button {
    background: none; border: none; color: var(--muted);
    font-size: 15px; cursor: pointer; padding: 4px 8px;
  }
  header button:hover { color: var(--accent); }
  #tunnel-btn {
    font: 600 10.5px var(--mono); letter-spacing: .12em;
    border: 1px solid var(--border-2); border-radius: 8px; padding: 5px 9px;
  }
  #tunnel-btn.pending { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }

  /* ── Layout: mobile = chat only; ≥ 960px = chat | nav | page ────── */
  #layout { flex: 1; display: flex; min-height: 0; }
  #chatpane { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #nav, #content { display: none; }
  @media (min-width: 960px) {
    #chatpane {
      flex: 0 0 clamp(330px, 30vw, 440px);
      border-right: 1px solid var(--border); background: var(--panel);
    }
    #nav {
      display: flex; flex-direction: column; min-height: 0;
      flex: 0 0 250px; border-right: 1px solid var(--border);
      overflow-y: auto; padding: 12px 10px;
    }
    /* Collapsible rail (Notion-like): toggled by ☰, auto-collapsed when a
       page opens on screens where three columns would be cramped */
    #layout.nav-hidden #nav { display: none; }
    #content { display: block; flex: 1; overflow-y: auto; min-width: 0; }
    #content-bar {
      position: sticky; top: 0; z-index: 3; background: var(--bg);
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
    }
    #content-bar button {
      background: none; border: 1px solid var(--border-2); border-radius: 7px;
      color: var(--muted); cursor: pointer; font-size: 14px; padding: 3px 9px;
    }
    #content-bar button:hover { color: var(--accent); border-color: var(--accent); }
    #content-title { font: 12px var(--mono); color: var(--faint); }
  }

  /* ── Chat ───────────────────────────────────────────────────────── */
  main#chat { flex: 1; overflow-y: auto; padding: 16px; scroll-behavior: smooth; }
  .msg {
    max-width: 88%; padding: 10px 14px; border-radius: 14px;
    margin-bottom: 8px; overflow-wrap: break-word;
  }
  .msg.user {
    background: var(--user-bubble); margin-left: auto;
    border-bottom-right-radius: 4px; white-space: pre-wrap;
  }
  .msg.agent {
    background: var(--card); border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg.error { background: #c65f4a22; border: 1px solid var(--danger); white-space: pre-wrap; }

  /* Rendered markdown (chat bubbles + page viewer) */
  .md > :not(:last-child) { margin-bottom: .6em; }
  .md h1, .md h2, .md h3, .md h4 { line-height: 1.3; margin-top: .5em; }
  .md h1 { font-size: 1.2em; } .md h2 { font-size: 1.1em; } .md h3, .md h4 { font-size: 1em; }
  .md h1, .md h2 { padding-bottom: .25em; border-bottom: 1px solid var(--border); }
  .md ul, .md ol { padding-left: 1.4em; }
  .md li + li { margin-top: .2em; }
  .md blockquote { border-left: 3px solid var(--accent); padding-left: .8em; color: var(--muted); }
  .md a { color: var(--accent); text-decoration-color: var(--accent-soft); }
  .md hr { border: none; border-top: 1px solid var(--border); }
  .md code {
    font: .85em var(--mono); background: var(--card-2);
    border-radius: 4px; padding: .1em .35em;
  }
  .md pre {
    background: var(--card-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; overflow-x: auto;
  }
  .md pre code { background: none; padding: 0; }
  .md table { border-collapse: collapse; display: block; overflow-x: auto; font-size: .92em; max-width: 100%; }
  .md th, .md td { border: 1px solid var(--border-2); padding: 4px 8px; text-align: left; }
  .md th { background: var(--card-2); }
  .md img { max-width: 100%; border-radius: 8px; border: 1px solid var(--border); }

  /* Typing indicator */
  .typing { display: inline-flex; gap: 5px; padding: 4px 0; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    animation: pulse 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse {
    0%, 60%, 100% { opacity: .2; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-3px); }
  }

  form {
    display: flex; gap: 8px; padding: 12px 16px;
    border-top: 1px solid var(--border); flex-shrink: 0; background: var(--panel);
  }
  textarea {
    flex: 1; resize: none; border: 1px solid var(--border-2); border-radius: 18px;
    padding: 10px 14px; font: inherit; background: var(--card); color: var(--fg);
    max-height: 120px; outline: none;
  }
  textarea:focus { border-color: var(--accent); }
  form button {
    border: none; border-radius: 50%; width: 42px; height: 42px; flex-shrink: 0;
    background: var(--accent); color: #14100a; font-size: 18px;
    cursor: pointer; align-self: flex-end;
  }
  form button:disabled { opacity: .35; }
  /* Type-ahead queue: messages sent while Alfred is busy wait here, then fire */
  #queued-strip {
    display: flex; flex-direction: column; gap: 5px;
    padding: 8px 16px 0; flex-shrink: 0;
  }
  #queued-strip .qchip {
    align-self: flex-end; max-width: 85%;
    font: 13px -apple-system, system-ui, sans-serif; color: var(--muted);
    background: var(--card-2); border: 1px dashed var(--border-2); border-radius: 12px;
    padding: 6px 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #queued-strip .qchip::before { content: "⏳ "; color: var(--accent); }
  /* One-shot confirmation shield: arms sensitive actions for a short window */
  #confirm-btn {
    background: none; border: 1px solid var(--border-2); color: var(--muted);
    font-size: 16px; width: 42px; height: 42px;
  }
  #confirm-btn.armed {
    border-color: var(--accent); color: var(--accent); background: var(--accent-soft);
    font: 700 12px var(--mono);
  }

  /* ── Nav (Notion-style rail) ────────────────────────────────────── */
  #nav .nav-head {
    display: flex; align-items: center; gap: 6px; padding: 2px 8px 10px;
  }
  #nav .nav-head .label {
    flex: 1; font: 600 10.5px var(--mono); letter-spacing: .2em;
    text-transform: uppercase; color: var(--faint);
  }
  #nav .nav-head button {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 13px; padding: 2px 6px;
  }
  #nav .nav-head button:hover { color: var(--accent); }
  .nav-item {
    display: flex; align-items: center; gap: 7px; width: 100%; text-align: left;
    background: none; border: none; color: var(--fg); cursor: pointer;
    padding: 5px 8px; border-radius: 6px; font-size: 13.5px;
  }
  .nav-item:hover { background: var(--card-2); }
  .nav-item.active { background: var(--accent-soft); color: var(--accent); }
  .nav-item .glyph { color: var(--accent); font-size: 12px; width: 14px; text-align: center; }
  #nav-todo { margin-bottom: 10px; font-weight: 600; }
  #mem-tree details { margin-left: 0; }
  #mem-tree details details { margin-left: 12px; }
  #mem-tree summary {
    cursor: pointer; padding: 4px 8px; border-radius: 6px; list-style: none;
    font: 600 12.5px var(--mono); color: var(--muted); user-select: none;
  }
  #mem-tree summary::before { content: "▸ "; color: var(--faint); }
  #mem-tree details[open] > summary::before { content: "▾ "; }
  #mem-tree summary:hover { background: var(--card-2); color: var(--fg); }
  #mem-tree .file {
    display: flex; align-items: center; gap: 6px; width: 100%; text-align: left;
    background: none; border: none; color: var(--fg); cursor: pointer;
    padding: 4px 8px 4px 22px; border-radius: 6px; font-size: 13px;
  }
  #mem-tree .file:hover { background: var(--card-2); }
  #mem-tree .file.active { background: var(--accent-soft); color: var(--accent); }
  #mem-tree .file .ext {
    font: 600 9px var(--mono); color: var(--accent); border: 1px solid var(--border-2);
    border-radius: 4px; padding: 1px 4px; flex-shrink: 0;
  }
  #mem-tree .archive { opacity: .5; }
  .placeholder { color: var(--faint); font: 12px var(--mono); padding: 12px 8px; }

  /* ── Content: the "Notion page" surface ─────────────────────────── */
  .doc { max-width: 860px; margin: 0 auto; padding: 28px 44px 60px; }
  .doc .md { font-size: 15.5px; line-height: 1.65; }
  .doc .md h1 { font-size: 1.7em; border: none; margin-bottom: .4em; }
  .doc .md h2 { font-size: 1.25em; margin-top: 1.2em; }
  .doc .md h3 { font-size: 1.05em; margin-top: 1em; }

  /* Todo page */
  .todo-section { margin-bottom: 26px; }
  .todo-section h2 {
    font: 600 11px var(--mono); letter-spacing: .18em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px; display: flex; align-items: baseline; gap: 8px;
  }
  .todo-section h2 .count { color: var(--accent); }
  .task {
    display: flex; gap: 12px; align-items: flex-start;
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; margin-bottom: 8px;
  }
  .task.done { opacity: .45; }
  .task .box {
    width: 17px; height: 17px; border: 1.5px solid var(--border-2); border-radius: 5px;
    flex-shrink: 0; margin-top: 2px; background: none; cursor: pointer; padding: 0;
    color: transparent; font-size: 11px; line-height: 1;
  }
  .task .box:hover { border-color: var(--accent); color: var(--accent); }
  .task.done .box { color: var(--ok); border-color: var(--ok); cursor: default; }
  .task .body { flex: 1; min-width: 0; font-size: 14.5px; }
  .task .meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .badge {
    font: 600 10.5px var(--mono); letter-spacing: .05em; border-radius: 5px;
    padding: 2px 7px; border: 1px solid var(--border-2); color: var(--muted);
  }
  .badge.due { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }
  .badge.late { color: #e0765f; border-color: var(--danger); background: #c65f4a1a; }

  /* Attachments */
  .attachment {
    display: flex; align-items: center; gap: 10px; background: var(--card);
    border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px;
  }
  .attachment .ext {
    font: 600 11px var(--mono); color: var(--accent); border: 1px solid var(--border-2);
    border-radius: 5px; padding: 3px 7px;
  }
  .attachment a { color: var(--accent); }

  /* ── Ateliers (workbooks) ───────────────────────────────────────── */
  .doc.wide { max-width: 1180px; }
  .wb-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 18px; margin-bottom: 12px; cursor: pointer;
  }
  .wb-card:hover { border-color: var(--accent); }
  .wb-card h3 { font-size: 16px; margin-bottom: 6px; }
  .wb-card .sub { font: 12px var(--mono); color: var(--muted); margin-bottom: 10px; }
  .progress { height: 6px; background: var(--card-2); border-radius: 3px; overflow: hidden; }
  .progress > div { height: 100%; background: var(--accent); }
  .wb-head { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
  .wb-head h2 { font-size: 20px; flex: 1; }
  .wb-tabs { display: flex; gap: 4px; margin-bottom: 18px; flex-wrap: wrap; }
  .wb-tabs button {
    background: none; border: 1px solid var(--border-2); border-radius: 8px;
    color: var(--muted); font: 600 11px var(--mono); letter-spacing: .12em;
    text-transform: uppercase; padding: 7px 14px; cursor: pointer;
  }
  .wb-tabs button.active { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }
  .btn-accent {
    background: var(--accent); border: none; border-radius: 8px; color: #14100a;
    font: 600 12px var(--mono); padding: 9px 14px; cursor: pointer;
  }
  /* Débit / calepinage */
  .panel { margin-bottom: 22px; }
  .panel h4 { font: 600 12px var(--mono); color: var(--muted); margin-bottom: 8px; }
  .panel .cols { display: flex; gap: 8px; align-items: stretch; overflow-x: auto; }
  .panel .col {
    border: 1px solid var(--border-2); border-radius: 8px; padding: 8px;
    min-width: 130px; flex: 1;
  }
  .panel .col h5 { font: 600 10.5px var(--mono); color: var(--accent); margin-bottom: 6px; }
  .piece-block {
    display: block; width: 100%; text-align: left; cursor: pointer;
    background: var(--card); border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 8px; margin-bottom: 5px; font: 12px var(--mono); color: var(--fg);
  }
  .piece-block:hover { border-color: var(--accent); }
  .piece-block.done { opacity: .4; text-decoration: line-through; }
  .piece-block .dims { color: var(--muted); font-size: 10.5px; }
  .piece-block.flash { animation: flash 1.6s; }
  @keyframes flash { 0%, 60% { border-color: var(--accent); background: var(--accent-soft); } }
  /* Prépas & assemblage */
  .prep-card, .asm-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; margin-bottom: 10px;
  }
  .prep-card h4, .asm-card h4 { font: 600 13px var(--mono); color: var(--accent); margin-bottom: 6px; }
  .prep-card ul, .asm-card ol { padding-left: 1.3em; font-size: 14px; }
  .prep-card li + li, .asm-card li + li { margin-top: .35em; }
  /* Suivi */
  .reg-group { margin-bottom: 20px; }
  .reg-group h4 {
    font: 600 11px var(--mono); letter-spacing: .12em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 8px; display: flex; gap: 10px; align-items: center;
  }
  .reg-group h4 .count { color: var(--accent); }
  .tick-row {
    display: flex; align-items: center; gap: 10px; background: var(--card);
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; margin-bottom: 5px;
  }
  .tick-row.done { opacity: .45; }
  .tick-row input { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
  .tick-row .lbl { flex: 1; font: 13px var(--mono); cursor: pointer; }
  .tick-row .dims { color: var(--muted); font: 11px var(--mono); }
  /* Mode atelier (TV) */
  #atelier-mode {
    position: fixed; inset: 0; background: var(--bg); z-index: 20;
    display: flex; align-items: center; justify-content: center;
  }
  #atelier-exit {
    position: absolute; top: 18px; right: 22px; background: none; border: 1px solid var(--border-2);
    border-radius: 10px; color: var(--muted); font-size: 22px; padding: 8px 16px; cursor: pointer;
  }
  #atelier-body { text-align: center; max-width: 900px; padding: 24px; width: 100%; }
  #atelier-body .reg { font: 600 20px var(--mono); color: var(--accent); letter-spacing: .1em; margin-bottom: 18px; }
  #atelier-body .etq { font: 700 64px var(--mono); margin-bottom: 12px; overflow-wrap: break-word; }
  #atelier-body .dims { font: 32px var(--mono); color: var(--muted); margin-bottom: 10px; }
  #atelier-body .extra { font-size: 20px; color: var(--muted); margin-bottom: 30px; min-height: 1.4em; }
  #atelier-body .done-btn {
    background: var(--accent); border: none; border-radius: 16px; color: #14100a;
    font: 700 34px var(--mono); padding: 22px 60px; cursor: pointer;
  }
  #atelier-body .progress { margin-top: 34px; height: 10px; }
  #atelier-body .pcount { font: 16px var(--mono); color: var(--faint); margin-top: 10px; }
  /* Piece modal */
  #piece-modal {
    position: fixed; inset: 0; background: rgba(4, 6, 10, .7); z-index: 15;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  #piece-modal .card {
    background: var(--panel); border: 1px solid var(--border-2); border-radius: 14px;
    padding: 20px; width: min(480px, 100%); max-height: 80vh; overflow-y: auto;
  }
  #piece-modal h2 { font: 700 18px var(--mono); color: var(--accent); margin-bottom: 10px; }
  #piece-modal .row { font-size: 14px; margin-bottom: 8px; }
  #piece-modal .row b { font: 600 11px var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: .1em; display: block; }
  #piece-modal .actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  #piece-modal .actions button {
    flex: 1; background: var(--card); border: 1px solid var(--border-2); border-radius: 8px;
    color: var(--fg); font: 600 12px var(--mono); padding: 9px 10px; cursor: pointer;
  }

  /* ── Tunnel modal ───────────────────────────────────────────────── */
  #tunnel-modal {
    position: fixed; inset: 0; background: rgba(4, 6, 10, .7);
    display: flex; align-items: center; justify-content: center; z-index: 10;
    padding: 20px;
  }
  #tunnel-modal .card {
    background: var(--panel); border: 1px solid var(--border-2); border-radius: 14px;
    padding: 20px; width: min(420px, 100%);
  }
  #tunnel-modal h2 {
    font: 600 11px var(--mono); letter-spacing: .2em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 14px;
  }
  #tunnel-modal .row { margin-bottom: 12px; font-size: 14px; color: var(--muted); }
  #tunnel-modal .code {
    display: block; width: 100%; text-align: center; cursor: pointer;
    font: 700 26px var(--mono); letter-spacing: .12em; color: var(--fg);
    background: var(--card-2); border: 1px dashed var(--accent); border-radius: 10px;
    padding: 14px 10px; margin: 6px 0 4px;
  }
  #tunnel-modal .hint { font: 11px var(--mono); color: var(--faint); text-align: center; }
  #tunnel-modal .actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
  #tunnel-modal .actions a, #tunnel-modal .actions button {
    flex: 1; text-align: center; text-decoration: none; cursor: pointer;
    font: 600 12px var(--mono); border-radius: 8px; padding: 9px 12px;
    border: 1px solid var(--border-2); color: var(--fg); background: var(--card);
  }
</style>
</head>
<body>
<header>
  <div id="status"></div>
  <h1>Alfred</h1>
  <select id="model" title="Modèle"></select>
  <button id="tunnel-btn" title="Tunnel VS Code">VSC</button>
  <button id="reset" title="Nouvelle session">↺</button>
</header>
<div id="tunnel-modal" class="hidden">
  <div class="card">
    <h2>Tunnel VS Code</h2>
    <div id="tunnel-body"><div class="placeholder">chargement…</div></div>
    <div class="actions">
      <button id="tunnel-refresh">⟳ Rafraîchir</button>
      <button id="tunnel-close">Fermer</button>
    </div>
  </div>
</div>
<div id="layout">
  <section id="chatpane">
    <main id="chat"></main>
    <div id="queued-strip" class="hidden"></div>
    <form id="form">
      <button id="confirm-btn" type="button" title="Autoriser la prochaine action sensible (agenda…)">🛡</button>
      <textarea id="input" rows="1" placeholder="Message…" autocomplete="off"></textarea>
      <button id="send" type="submit">↑</button>
    </form>
  </section>
  <aside id="nav">
    <div class="nav-head">
      <span class="label">Mémoire</span>
      <button id="nav-refresh" title="Rafraîchir">⟳</button>
    </div>
    <button class="nav-item active" id="nav-todo"><span class="glyph">◈</span>Todo</button>
    <button class="nav-item" id="nav-ateliers"><span class="glyph">◧</span>Ateliers</button>
    <div id="mem-tree"><div class="placeholder">chargement…</div></div>
  </aside>
  <main id="content">
    <div id="content-bar">
      <button id="nav-toggle" title="Afficher / masquer l’arborescence">☰</button>
      <span id="content-title">Todo</span>
    </div>
    <div class="doc" id="view-todo"><div class="placeholder">chargement…</div></div>
    <div class="doc hidden" id="mem-viewer"></div>
    <div class="doc hidden" id="view-ateliers"></div>
    <div class="doc wide hidden" id="view-workbook"></div>
  </main>
</div>
<!-- Fullscreen shop mode: one piece at a time, TV-sized -->
<div id="atelier-mode" class="hidden">
  <button id="atelier-exit">✕</button>
  <div id="atelier-body"></div>
</div>
<!-- Piece detail -->
<div id="piece-modal" class="hidden">
  <div class="card" id="piece-body"></div>
</div>
<script src="/static/vendor/marked.min.js"></script>
<script src="/static/vendor/purify.min.js"></script>
<script>
const chat = document.getElementById('chat');
const form = document.getElementById('form');
const input = document.getElementById('input');
const send = document.getElementById('send');
const status = document.getElementById('status');
const modelSel = document.getElementById('model');

let token = localStorage.getItem('gw_token') || '';
let oidcEnabled = false;
fetch('/api/auth/config').then(r => r.json())
  .then(c => { oidcEnabled = c.oidcEnabled; }).catch(() => {});

// Model picker: "Auto" (server default) + the gateway's configured list.
const savedModel = localStorage.getItem('gw_model') || '';
modelSel.add(new Option('Auto', ''));
fetch('/api/models').then(r => r.json()).then(({ models }) => {
  for (const m of models) modelSel.add(new Option(m.label, m.id));
  if ([...modelSel.options].some(o => o.value === savedModel)) modelSel.value = savedModel;
}).catch(() => {});
modelSel.addEventListener('change', () => localStorage.setItem('gw_model', modelSel.value));

marked.setOptions({ gfm: true, breaks: true });

const IMG_EXT = /\.(png|jpe?g|gif|webp|svg|heic|heif)$/i;
const MD_EXT = /\.md$/i;

function headers(json) {
  const h = {};
  if (json) h['Content-Type'] = 'application/json';
  // Bearer fallback only without SSO (dev mode); with OIDC the session
  // cookie does the work.
  if (!oidcEnabled && token) h['Authorization'] = 'Bearer ' + token;
  return h;
}

function onUnauthorized() {
  if (oidcEnabled) { window.location = '/auth/login'; return true; }
  return false;
}

function esc(s) { return s.replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

/* ── Markdown rendering with memory-aware links ─────────────────────
   baseDir ('' for chat) resolves relative links/images against the
   memory tree; [[wiki links]] resolve from the memory root. */
function normPath(p) {
  const out = [];
  for (const seg of p.split('/')) {
    if (!seg || seg === '.') continue;
    if (seg === '..') out.pop(); else out.push(seg);
  }
  return out.join('/');
}

function renderMd(mdText, baseDir) {
  const src = mdText.replace(/\[\[([^\]]+)\]\]/g, (_, t) => `[${t.trim()}](/mem/${t.trim()})`);
  const el = document.createElement('div');
  el.className = 'md';
  el.innerHTML = DOMPurify.sanitize(marked.parse(src));
  el.querySelectorAll('img').forEach(img => {
    const s = img.getAttribute('src') || '';
    if (s.startsWith('/mem/')) img.src = '/api/memory/raw/' + normPath(s.slice(5));
    else if (!/^[a-z]+:/i.test(s) && !s.startsWith('/')) img.src = '/api/memory/raw/' + normPath(baseDir + '/' + s);
    img.loading = 'lazy';
  });
  el.querySelectorAll('a').forEach(a => {
    const href = a.getAttribute('href') || '';
    let target = null;
    if (href.startsWith('/mem/')) target = decodeURI(href.slice(5));
    else if (!/^[a-z]+:/i.test(href) && !href.startsWith('/') && !href.startsWith('#'))
      target = baseDir + '/' + decodeURI(href);
    if (target !== null) {
      target = normPath(target);
      if (!/\.[a-z0-9]+$/i.test(target)) target += '.md';
      a.href = '#'; a.dataset.mem = target;
    } else if (/^https?:/i.test(href)) { a.target = '_blank'; a.rel = 'noopener'; }
  });
  return el;
}

// Any rendered memory link (chat included) opens in the page panel.
document.addEventListener('click', (e) => {
  const a = e.target.closest('a[data-mem]');
  if (!a) return;
  e.preventDefault();
  openMemory(a.dataset.mem);
});

/* ── Chat ───────────────────────────────────────────────────────── */
function add(cls, text) {
  let el;
  if (cls === 'agent') { el = renderMd(text, ''); el.classList.add('msg', 'agent'); }
  else { el = document.createElement('div'); el.className = 'msg ' + cls; el.textContent = text; }
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

function addTyping() {
  const el = document.createElement('div');
  el.className = 'msg agent';
  el.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

async function askToken() {
  token = prompt('Jeton d’accès :') || '';
  localStorage.setItem('gw_token', token);
}

// Type-ahead queue: while Alfred is busy, new messages wait instead of 409ing.
let busy = false;
const queue = [];
const queuedStrip = document.getElementById('queued-strip');

function renderQueued() {
  queuedStrip.innerHTML = '';
  queuedStrip.classList.toggle('hidden', queue.length === 0);
  for (const t of queue) {
    const c = document.createElement('div');
    c.className = 'qchip'; c.textContent = t;
    queuedStrip.appendChild(c);
  }
}

function submitText(text) {
  if (busy) { queue.push(text); renderQueued(); return; }
  sendMessage(text);
}

async function sendMessage(text) {
  busy = true;
  add('user', text);
  const pending = addTyping();
  status.classList.add('busy');
  try {
    const res = await fetch('/api/chat', {
      method: 'POST', headers: headers(true),
      body: JSON.stringify({ message: text, model: modelSel.value || undefined }),
    });
    if (res.status === 401) { pending.remove(); if (!onUnauthorized()) await askToken(); return; }
    if (!res.ok) throw new Error((await res.json()).detail || res.status);
    // Parse the SSE stream by hand (EventSource can't POST). The typing
    // bubble stays below intermediate texts until "done".
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      let idx;
      while ((idx = buf.indexOf('\n\n')) >= 0) {
        const raw = buf.slice(0, idx); buf = buf.slice(idx + 2);
        const ev = /^event: (.*)$/m.exec(raw)?.[1];
        const data = JSON.parse(/^data: (.*)$/m.exec(raw)?.[1] || '{}');
        if (ev === 'text') { add('agent', data.text); chat.appendChild(pending); chat.scrollTop = chat.scrollHeight; }
        else if (ev === 'error') add('error', data.message);
      }
    }
    refreshNav();  // the agent may have updated todo/memory
  } catch (e) {
    add('error', String(e));
  } finally {
    pending.remove();
    status.classList.remove('busy');
    busy = false;
    syncConfirm();  // a sensitive action may have consumed the shield
    if (queue.length) {           // fire the next type-ahead message
      const next = queue.shift();
      renderQueued();
      sendMessage(next);
    }
  }
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  submitText(text);
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

document.getElementById('reset').addEventListener('click', async () => {
  if (!confirm('Repartir sur une session vierge ?')) return;
  await fetch('/api/reset', { method: 'POST', headers: headers(false) });
  chat.innerHTML = '';
  queue.length = 0;
  renderQueued();
});

/* ── Nav + content (≥ 960px): Notion-like rail and page surface ─── */
const contentEl = document.getElementById('content');
const viewTodo = document.getElementById('view-todo');
const memTreeEl = document.getElementById('mem-tree');
const memViewerEl = document.getElementById('mem-viewer');
const navTodoBtn = document.getElementById('nav-todo');
let memInfo = null;   // {root, todo, entries}
let currentPath = null;

function contentVisible() { return getComputedStyle(contentEl).display !== 'none'; }

const layoutEl = document.getElementById('layout');
const contentTitle = document.getElementById('content-title');
document.getElementById('nav-toggle').addEventListener('click', () =>
  layoutEl.classList.toggle('nav-hidden'));
// Three columns get cramped below 1280px: auto-fold the rail on page open
function autoFoldNav() { if (window.innerWidth < 1280) layoutEl.classList.add('nav-hidden'); }

navTodoBtn.addEventListener('click', showTodo);
document.getElementById('nav-refresh').addEventListener('click', () => refreshNav(true));

function markActive(path) {
  currentPath = path;   // null = todo
  navTodoBtn.classList.toggle('active', path === null);
  navAteliersBtn.classList.remove('active');
  memTreeEl.querySelectorAll('.file').forEach(b => b.classList.toggle('active', b.dataset.path === path));
}

function showTodo() {
  switchDoc(viewTodo);
  markActive(null);
  contentTitle.textContent = 'Todo';
  autoFoldNav();
}

async function refreshNav(force) {
  if (!contentVisible()) return;
  try {
    const res = await fetch('/api/memory/tree', { headers: headers(false) });
    if (!res.ok) throw new Error(res.status);
    memInfo = await res.json();
    renderTree();
    await renderTodo();
  } catch (e) {
    if (force) viewTodo.innerHTML = '<div class="placeholder">mémoire indisponible (' + esc(String(e)) + ')</div>';
  }
}

/* ── Todo page ──────────────────────────────────────────────────── */
async function renderTodo() {
  if (!memInfo) return;
  const todoPath = memInfo.todo;
  const baseDir = todoPath.split('/').slice(0, -1).join('/');
  const res = await fetch('/api/memory/raw/' + todoPath, { headers: headers(false) });
  if (!res.ok) { viewTodo.innerHTML = '<div class="placeholder">pas de fichier todo</div>'; return; }
  const md = await res.text();

  // Parse "## section" blocks of "- [ ] item" (with indented continuations)
  const sections = [];
  let cur = null, item = null;
  for (const line of md.split('\n')) {
    const h = line.match(/^##\s+(.*)/);
    if (h) { cur = { title: h[1], items: [] }; sections.push(cur); item = null; continue; }
    if (!cur) continue;
    const t = line.match(/^- \[([ xX])\]\s+(.*)/);
    if (t) { item = { done: t[1] !== ' ', text: t[2] }; cur.items.push(item); continue; }
    if (item && /^\s+\S/.test(line) && !/^\s*[-*#>]/.test(line)) item.text += ' ' + line.trim();
    else item = null;
  }

  const today = new Date().toISOString().slice(0, 10);
  viewTodo.innerHTML = '';
  for (const sec of sections) {
    const box = document.createElement('div');
    box.className = 'todo-section';
    const open = sec.items.filter(i => !i.done).length;
    box.innerHTML = `<h2>${esc(sec.title.replace(/\(.*\)/, '').trim())} <span class="count">${sec.items.length ? open : ''}</span></h2>`;
    if (!sec.items.length) box.insertAdjacentHTML('beforeend', '<div class="placeholder">rien</div>');
    for (const it of sec.items) box.appendChild(renderTask(it, baseDir, today));
    viewTodo.appendChild(box);
  }
}

function renderTask(it, baseDir, today) {
  let text = it.text;
  const due = text.match(/\(échéance:\s*(\d{4}-\d{2}-\d{2})([^)]*)\)/);
  const added = text.match(/\*\(ajouté[^)]*\)\*/);
  text = text.replace(/—?\s*\(échéance:[^)]*\)/, '').replace(/\*\(ajouté[^)]*\)\*/, '').trim();

  const el = document.createElement('div');
  el.className = 'task' + (it.done ? ' done' : '');

  const box = document.createElement('button');
  box.className = 'box'; box.textContent = '✓';
  box.title = it.done ? 'Faite' : 'Demander à Alfred de la marquer comme faite';
  if (!it.done) box.addEventListener('click', () => {
    input.value = 'Marque cette tâche comme faite : « ' +
      text.replace(/\[([^\]]*)\]\([^)]*\)/g, '$1').replace(/\[\[|\]\]/g, '') + ' »';
    input.focus(); input.dispatchEvent(new Event('input'));
  });
  el.appendChild(box);

  const body = document.createElement('div');
  body.className = 'body';
  body.appendChild(renderMd(text, baseDir));

  const meta = document.createElement('div');
  meta.className = 'meta';
  if (due) {
    const b = document.createElement('span');
    const d = due[1];
    b.className = 'badge ' + (d < today ? 'late' : d === today ? 'due' : '');
    b.textContent = (d < today ? '⚠ ' : '') + (d === today ? "aujourd'hui" : d) + (due[2] || '').replace(/^,\s*/, ' · ');
    meta.appendChild(b);
  }
  if (added) {
    const b = document.createElement('span');
    b.className = 'badge';
    b.textContent = added[0].replace(/\*|\(|\)/g, '');
    meta.appendChild(b);
  }
  if (meta.children.length) body.appendChild(meta);
  el.appendChild(body);
  return el;
}

/* ── Memory tree (always visible) + page viewer ─────────────────── */
function renderTree() {
  if (!memInfo) return;
  const root = { children: new Map() };
  for (const e of memInfo.entries) {
    const parts = e.path.split('/');
    let node = root;
    for (let i = 0; i < parts.length; i++) {
      if (!node.children.has(parts[i]))
        node.children.set(parts[i], { name: parts[i], dir: true, children: new Map() });
      node = node.children.get(parts[i]);
      if (i === parts.length - 1) { node.dir = e.dir; node.path = e.path; }
    }
  }
  memTreeEl.innerHTML = '';
  memTreeEl.appendChild(renderNode(root, 0));
  markActive(currentPath);
}

function renderNode(node, depth) {
  const frag = document.createDocumentFragment();
  const kids = [...node.children.values()]
    .sort((a, b) => (b.dir - a.dir) || a.name.localeCompare(b.name, 'fr'));
  for (const k of kids) {
    if (k.dir) {
      const det = document.createElement('details');
      if (depth === 0) det.open = true;
      if (k.name === 'archive') { det.open = false; det.className = 'archive'; }
      const sum = document.createElement('summary');
      sum.textContent = k.name + '/';
      det.appendChild(sum);
      det.appendChild(renderNode(k, depth + 1));
      frag.appendChild(det);
    } else {
      const btn = document.createElement('button');
      btn.className = 'file';
      btn.dataset.path = k.path;
      const name = document.createElement('span');
      name.textContent = k.name.replace(MD_EXT, '');
      btn.appendChild(name);
      const m = k.name.match(/\.([a-z0-9]+)$/i);
      if (m && !MD_EXT.test(k.name)) {
        const ext = document.createElement('span');
        ext.className = 'ext'; ext.textContent = m[1].toUpperCase();
        btn.appendChild(ext);
      }
      btn.addEventListener('click', () => openMemory(k.path));
      frag.appendChild(btn);
    }
  }
  return frag;
}

async function openMemory(path) {
  if (!contentVisible()) return;  // mobile: chat only
  switchDoc(memViewerEl);
  memViewerEl.innerHTML = '';
  markActive(path);
  // Unfold the tree down to the opened file
  const btn = memTreeEl.querySelector(`.file[data-path="${CSS.escape(path)}"]`);
  for (let d = btn?.closest('details'); d; d = d.parentElement?.closest('details')) d.open = true;

  contentTitle.textContent = (memInfo ? memInfo.root + '/' : '') + path;
  autoFoldNav();

  const baseDir = path.split('/').slice(0, -1).join('/');
  if (MD_EXT.test(path)) {
    const res = await fetch('/api/memory/raw/' + path, { headers: headers(false) });
    if (!res.ok) { memViewerEl.insertAdjacentHTML('beforeend', '<div class="placeholder">introuvable</div>'); return; }
    memViewerEl.appendChild(renderMd(await res.text(), baseDir));
  } else if (IMG_EXT.test(path)) {
    const img = document.createElement('img');
    img.src = '/api/memory/raw/' + path;
    img.style.maxWidth = '100%'; img.style.borderRadius = '8px';
    img.onerror = () => { img.remove(); memViewerEl.appendChild(attachmentCard(path)); };
    memViewerEl.appendChild(img);
    memViewerEl.appendChild(downloadLink(path));
  } else {
    memViewerEl.appendChild(attachmentCard(path));
  }
  contentEl.scrollTop = 0;
}

function attachmentCard(path) {
  const name = path.split('/').pop();
  const ext = (name.match(/\.([a-z0-9]+)$/i) || [, '?'])[1].toUpperCase();
  const el = document.createElement('div');
  el.className = 'attachment';
  el.innerHTML = `<span class="ext">${esc(ext)}</span>`;
  el.appendChild(downloadLink(path, name));
  return el;
}

function downloadLink(path, label) {
  const a = document.createElement('a');
  a.href = '/api/memory/raw/' + path + '?download=1';
  a.textContent = label || 'Télécharger ' + path.split('/').pop();
  a.style.display = 'inline-block'; a.style.marginTop = '8px';
  return a;
}

/* ── Ateliers: workbook hub + native 4-view workbook ────────────── */
const viewAteliers = document.getElementById('view-ateliers');
const viewWb = document.getElementById('view-workbook');
const navAteliersBtn = document.getElementById('nav-ateliers');
const atelierEl = document.getElementById('atelier-mode');
const pieceModal = document.getElementById('piece-modal');
let wb = null;          // {path, data, state, byEtq}
let wbTab = 'suivi';

navAteliersBtn.addEventListener('click', showAteliers);
document.getElementById('atelier-exit').addEventListener('click', () => atelierEl.classList.add('hidden'));
pieceModal.addEventListener('click', (e) => { if (e.target === pieceModal) pieceModal.classList.add('hidden'); });

function switchDoc(el) {
  for (const d of document.querySelectorAll('#content .doc')) d.classList.toggle('hidden', d !== el);
}

async function showAteliers() {
  markActive(null);
  navTodoBtn.classList.remove('active');
  navAteliersBtn.classList.add('active');
  contentTitle.textContent = 'Ateliers';
  switchDoc(viewAteliers);
  autoFoldNav();
  viewAteliers.innerHTML = '<div class="placeholder">chargement…</div>';
  let list;
  try {
    const res = await fetch('/api/workbook/list', { headers: headers(false), cache: 'no-store' });
    list = (await res.json()).workbooks;
  } catch { viewAteliers.innerHTML = '<div class="placeholder">indisponible</div>'; return; }
  viewAteliers.innerHTML = '';
  if (!list.length) {
    viewAteliers.innerHTML = '<div class="placeholder">Aucun workbook — demandez à Alfred d’en générer un (skill menuiserie).</div>';
    return;
  }
  for (const w of list) {
    const card = document.createElement('div');
    card.className = 'wb-card';
    const pct = w.pieces ? Math.round(100 * w.done / w.pieces) : 0;
    const last = w.lastActivity ? new Date(w.lastActivity).toLocaleString('fr-FR', { dateStyle: 'short', timeStyle: 'short' }) : 'jamais';
    card.innerHTML = `<h3>${esc(w.titre)}</h3>
      <div class="sub">${w.done}/${w.pieces} pièces · dernière activité : ${esc(last)}</div>
      <div class="progress"><div style="width:${pct}%"></div></div>`;
    card.addEventListener('click', () => openWorkbook(w.path));
    viewAteliers.appendChild(card);
  }
}

async function openWorkbook(path) {
  let data, state;
  try {
    const [rd, rs] = await Promise.all([
      fetch('/api/memory/raw/' + path, { headers: headers(false), cache: 'no-store' }),
      fetch('/api/workbook/state?wb=' + encodeURIComponent(path), { headers: headers(false), cache: 'no-store' }),
    ]);
    if (!rd.ok) throw new Error(rd.status);
    data = await rd.json(); state = await rs.json();
  } catch (e) { viewAteliers.innerHTML = '<div class="placeholder">workbook illisible (' + esc(String(e)) + ')</div>'; return; }
  wb = { path, data, state, byEtq: new Map((data.pieces || []).map(p => [p.etiquette, p])) };
  localStorage.setItem('gw_wb', path);
  contentTitle.textContent = data.titre || data.projet || path;
  switchDoc(viewWb);
  renderWb();
}

function wbDone(etq) { return !!wb.state.fait[etq]; }
function pieceDims(p) { return `${p.longueur}×${p.largeur}×${p.ep}`; }

async function tick(etq, done) {
  try {
    const res = await fetch('/api/workbook/state', {
      method: 'POST', headers: headers(true),
      body: JSON.stringify({ wb: wb.path, etiquette: etq, done }),
    });
    if (res.ok) wb.state = await res.json();
  } catch {}
  renderWb();
  if (!atelierEl.classList.contains('hidden')) renderAtelier();
}

function renderWb() {
  const d = wb.data;
  const total = (d.pieces || []).length;
  const done = Object.keys(wb.state.fait).filter(e => wb.byEtq.has(e)).length;
  viewWb.innerHTML = '';
  const head = document.createElement('div');
  head.className = 'wb-head';
  head.innerHTML = `<h2>${esc(d.titre || d.projet || '')}</h2>
    <span class="sub" style="font:12px var(--mono);color:var(--muted)">${done}/${total}</span>`;
  const shopBtn = document.createElement('button');
  shopBtn.className = 'btn-accent'; shopBtn.textContent = '▶ Mode atelier';
  shopBtn.addEventListener('click', () => { atelierEl.classList.remove('hidden'); renderAtelier(); });
  head.appendChild(shopBtn);
  viewWb.appendChild(head);
  const prog = document.createElement('div');
  prog.className = 'progress';
  prog.innerHTML = `<div style="width:${total ? Math.round(100 * done / total) : 0}%"></div>`;
  prog.style.marginBottom = '16px';
  viewWb.appendChild(prog);

  const tabs = document.createElement('div');
  tabs.className = 'wb-tabs';
  for (const [id, label] of [['debit', 'Débit'], ['prepas', 'Prépas'], ['assemblage', 'Assemblage'], ['suivi', 'Suivi']]) {
    const b = document.createElement('button');
    b.textContent = label;
    b.classList.toggle('active', wbTab === id);
    b.addEventListener('click', () => { wbTab = id; renderWb(); });
    tabs.appendChild(b);
  }
  viewWb.appendChild(tabs);

  const body = document.createElement('div');
  viewWb.appendChild(body);
  if (wbTab === 'debit') renderDebit(body);
  else if (wbTab === 'prepas') renderPrepas(body);
  else if (wbTab === 'assemblage') renderAsm(body);
  else renderSuivi(body);
}

function pieceBlock(etq) {
  const p = wb.byEtq.get(etq);
  const b = document.createElement('button');
  b.className = 'piece-block' + (wbDone(etq) ? ' done' : '');
  b.dataset.etq = etq;
  b.innerHTML = `${esc(etq)}<div class="dims">${p ? esc(pieceDims(p)) : ''}</div>`;
  b.addEventListener('click', () => showPiece(etq));
  return b;
}

function renderDebit(body) {
  for (const pan of wb.data.calepinage || []) {
    const el = document.createElement('div');
    el.className = 'panel';
    el.innerHTML = `<h4>${esc(pan.panneau)} — ${esc(pan.dims || '')}</h4>`;
    const cols = document.createElement('div');
    cols.className = 'cols';
    for (const col of pan.colonnes || []) {
      const c = document.createElement('div');
      c.className = 'col';
      c.innerHTML = `<h5>${esc(String(col.largeur))} mm · ${esc(col.reglageFS || '')}</h5>`;
      for (const etq of col.pieces || []) c.appendChild(pieceBlock(etq));
      cols.appendChild(c);
    }
    el.appendChild(cols);
    body.appendChild(el);
  }
  if (!(wb.data.calepinage || []).length) body.innerHTML = '<div class="placeholder">pas de calepinage</div>';
}

function renderPrepas(body) {
  let any = false;
  for (const p of wb.data.pieces || []) {
    if (!(p.preparations || []).length) continue;
    any = true;
    const el = document.createElement('div');
    el.className = 'prep-card';
    el.innerHTML = `<h4>${esc(p.etiquette)} <span style="color:var(--muted)">· ${esc(pieceDims(p))}</span></h4>
      <ul>${p.preparations.map(pr => `<li><b>${esc(pr.type)}</b> — ${esc(pr.cotes || '')} ${pr.pos ? '· ' + esc(pr.pos) : ''}</li>`).join('')}</ul>`;
    el.querySelector('h4').style.cursor = 'pointer';
    el.querySelector('h4').addEventListener('click', () => showPiece(p.etiquette));
    body.appendChild(el);
  }
  if (!any) body.innerHTML = '<div class="placeholder">aucune préparation</div>';
}

function renderAsm(body) {
  for (const m of wb.data.assemblage || []) {
    const el = document.createElement('div');
    el.className = 'asm-card';
    el.id = 'asm-' + m.module;
    el.innerHTML = `<h4>${esc(m.titre || m.module)}</h4>
      <ol>${(m.sequence || []).map(s => `<li>${esc(s)}</li>`).join('')}</ol>`;
    body.appendChild(el);
  }
  if (!(wb.data.assemblage || []).length) body.innerHTML = '<div class="placeholder">pas de séquence d’assemblage</div>';
}

function suiviGroups() {
  const groups = new Map();
  for (const p of wb.data.pieces || []) {
    const key = p.reglageFS || '—';
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(p);
  }
  return groups;
}

function renderSuivi(body) {
  for (const [reg, pieces] of suiviGroups()) {
    const g = document.createElement('div');
    g.className = 'reg-group';
    const open = pieces.filter(p => !wbDone(p.etiquette)).length;
    g.innerHTML = `<h4>${esc(reg)} <span class="count">${open ? open + ' restantes' : '✓'}</span></h4>`;
    for (const p of pieces) {
      const row = document.createElement('div');
      row.className = 'tick-row' + (wbDone(p.etiquette) ? ' done' : '');
      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.checked = wbDone(p.etiquette);
      cb.addEventListener('change', () => tick(p.etiquette, cb.checked));
      const lbl = document.createElement('span');
      lbl.className = 'lbl'; lbl.textContent = p.etiquette;
      lbl.addEventListener('click', () => showPiece(p.etiquette));
      const dims = document.createElement('span');
      dims.className = 'dims'; dims.textContent = pieceDims(p) + (p.panneau ? ' · ' + p.panneau : '');
      row.append(cb, lbl, dims);
      g.appendChild(row);
    }
    body.appendChild(g);
  }
}

function showPiece(etq) {
  const p = wb.byEtq.get(etq);
  if (!p) return;
  const body = document.getElementById('piece-body');
  body.innerHTML = `<h2>${esc(etq)}</h2>
    <div class="row"><b>Dimensions</b>${esc(pieceDims(p))} mm — ${esc(p.reglageFS || '')}</div>
    <div class="row"><b>Débit</b>panneau ${esc(p.panneau || '?')}, colonne ${esc(String(p.colonne ?? '?'))}</div>
    ${(p.preparations || []).length ? `<div class="row"><b>Préparations</b>${p.preparations.map(pr => esc(`${pr.type} ${pr.cotes || ''} ${pr.pos || ''}`)).join('<br>')}</div>` : ''}
    ${p.placeAssemblage ? `<div class="row"><b>Assemblage</b>${esc(p.placeAssemblage)}</div>` : ''}`;
  const actions = document.createElement('div');
  actions.className = 'actions';
  const goDebit = document.createElement('button');
  goDebit.textContent = 'Voir au débit';
  goDebit.addEventListener('click', () => { pieceModal.classList.add('hidden'); wbTab = 'debit'; renderWb(); flashPiece(etq); });
  const goAsm = document.createElement('button');
  goAsm.textContent = 'Voir à l’assemblage';
  goAsm.addEventListener('click', () => {
    pieceModal.classList.add('hidden'); wbTab = 'assemblage'; renderWb();
    document.getElementById('asm-' + p.module)?.scrollIntoView({ behavior: 'smooth' });
  });
  const tickBtn = document.createElement('button');
  tickBtn.textContent = wbDone(etq) ? 'Décocher' : 'Marquer faite ✓';
  tickBtn.addEventListener('click', () => { pieceModal.classList.add('hidden'); tick(etq, !wbDone(etq)); });
  actions.append(goDebit, goAsm, tickBtn);
  body.appendChild(actions);
  pieceModal.classList.remove('hidden');
}

function flashPiece(etq) {
  const el = viewWb.querySelector(`.piece-block[data-etq="${CSS.escape(etq)}"]`);
  if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.classList.add('flash'); setTimeout(() => el.classList.remove('flash'), 1700); }
}

/* Shop mode: pieces in réglage order, first not-done, huge */
function renderAtelier() {
  const bodyEl = document.getElementById('atelier-body');
  const ordered = [];
  for (const [, pieces] of suiviGroups()) ordered.push(...pieces);
  const total = ordered.length;
  const remaining = ordered.filter(p => !wbDone(p.etiquette));
  if (!remaining.length) {
    bodyEl.innerHTML = `<div class="etq">Terminé 🎉</div><div class="dims">${total} pièces débitées</div>`;
    return;
  }
  const cur = remaining[0];
  const doneCount = total - remaining.length;
  bodyEl.innerHTML = `<div class="reg">${esc(cur.reglageFS || '')}</div>
    <div class="etq">${esc(cur.etiquette)}</div>
    <div class="dims">${esc(pieceDims(cur))} mm</div>
    <div class="extra">${esc((cur.preparations || []).map(pr => pr.type).join(' · ') || '')}</div>`;
  const btn = document.createElement('button');
  btn.className = 'done-btn'; btn.textContent = 'FAIT ✓';
  btn.addEventListener('click', () => tick(cur.etiquette, true));
  bodyEl.appendChild(btn);
  bodyEl.insertAdjacentHTML('beforeend',
    `<div class="progress"><div style="width:${Math.round(100 * doneCount / total)}%"></div></div>
     <div class="pcount">${doneCount}/${total} — réglage : ${esc(String(cur.reglageFS || '—'))}</div>`);
}

/* ── One-shot confirmation shield ───────────────────────────────── */
// The countdown is cosmetic; the server owns the truth. While armed we
// re-sync every few seconds so a consumption (or another device) disarms
// the button instead of letting it count down into fiction.
const confirmBtn = document.getElementById('confirm-btn');
let confirmTimer = null, confirmPoll = null;

function paintConfirm(remaining) {
  clearInterval(confirmTimer);
  if (remaining <= 0) {
    confirmBtn.classList.remove('armed'); confirmBtn.textContent = '🛡';
    clearInterval(confirmPoll); confirmPoll = null;
    return;
  }
  confirmBtn.classList.add('armed');
  let left = remaining;
  confirmBtn.textContent = left;
  confirmTimer = setInterval(() => {
    left -= 1;
    if (left <= 0) paintConfirm(0); else confirmBtn.textContent = left;
  }, 1000);
  if (!confirmPoll) confirmPoll = setInterval(syncConfirm, 4000);
}

async function syncConfirm() {
  try {
    const res = await fetch('/api/confirm', { headers: headers(false), cache: 'no-store' });
    if (!res.ok) return;
    const s = await res.json();
    paintConfirm(s.armed ? s.remaining : 0);
  } catch {}
}

confirmBtn.addEventListener('click', async () => {
  try {
    const res = await fetch('/api/confirm', { method: 'POST', headers: headers(false) });
    if (res.status === 401) { onUnauthorized(); return; }
    const s = await res.json();
    paintConfirm(s.remaining || 0);
  } catch {}
});

syncConfirm();  // reflect server state on load (another device may have armed it)

/* ── VS Code tunnel: device-code reconnect helper ───────────────── */
const tunnelBtn = document.getElementById('tunnel-btn');
const tunnelModal = document.getElementById('tunnel-modal');
const tunnelBody = document.getElementById('tunnel-body');

tunnelBtn.addEventListener('click', () => { tunnelModal.classList.remove('hidden'); refreshTunnel(); });
document.getElementById('tunnel-close').addEventListener('click', () => tunnelModal.classList.add('hidden'));
document.getElementById('tunnel-refresh').addEventListener('click', refreshTunnel);
tunnelModal.addEventListener('click', (e) => { if (e.target === tunnelModal) tunnelModal.classList.add('hidden'); });

async function refreshTunnel() {
  tunnelBody.innerHTML = '<div class="placeholder">chargement…</div>';
  let t;
  try {
    const res = await fetch('/api/tunnel', { headers: headers(false), cache: 'no-store' });
    if (!res.ok) throw new Error(res.status);
    t = await res.json();
  } catch (e) {
    tunnelBody.innerHTML = '<div class="row">État du tunnel indisponible (' + esc(String(e)) + ')</div>';
    return;
  }
  tunnelBtn.classList.toggle('pending', !!t.pending);
  tunnelBody.innerHTML = '';
  if (!t.available) {
    tunnelBody.innerHTML = '<div class="row">Pas de journal de tunnel — le conteneur tunnel n’a pas (encore) écrit ' +
      'son fichier de sortie. Image claude-pod ≥ 0.2.0 requise.</div>';
    return;
  }
  if (t.pending && t.code) {
    tunnelBody.insertAdjacentHTML('beforeend',
      '<div class="row">Appairage GitHub demandé — entrez ce code sur la page de connexion :</div>');
    const codeBtn = document.createElement('button');
    codeBtn.className = 'code'; codeBtn.textContent = t.code; codeBtn.title = 'Copier';
    codeBtn.addEventListener('click', async () => {
      try { await navigator.clipboard.writeText(t.code); codeBtn.textContent = 'copié ✓';
        setTimeout(() => { codeBtn.textContent = t.code; }, 1500); } catch {}
    });
    tunnelBody.appendChild(codeBtn);
    tunnelBody.insertAdjacentHTML('beforeend', '<div class="hint">tap pour copier</div>');
    const a = document.createElement('a');
    a.href = t.deviceUrl; a.target = '_blank'; a.rel = 'noopener';
    a.textContent = 'Ouvrir ' + new URL(t.deviceUrl).hostname;
    a.style.cssText = 'display:block;text-align:center;margin-top:12px;padding:10px;border-radius:8px;' +
      'background:var(--accent);color:#14100a;font:600 13px var(--mono);text-decoration:none;';
    tunnelBody.appendChild(a);
  } else {
    tunnelBody.insertAdjacentHTML('beforeend',
      '<div class="row">Aucun appairage en attente — le tunnel est connecté ou silencieux ' +
      '(dernier signe de vie : il y a ' + fmtAge(t.age) + ').</div>');
  }
  if (t.openUrl) {
    const a = document.createElement('a');
    a.href = t.openUrl; a.target = '_blank'; a.rel = 'noopener';
    a.textContent = 'Ouvrir dans vscode.dev →';
    a.style.cssText = 'display:block;margin-top:10px;color:var(--accent);font:12.5px var(--mono);';
    tunnelBody.appendChild(a);
  }
}

function fmtAge(s) {
  if (s < 90) return s + ' s';
  if (s < 5400) return Math.round(s / 60) + ' min';
  return Math.round(s / 3600) + ' h';
}

// Light polling so the VSC chip lights up gold when a device code is waiting
async function pollTunnel() {
  try {
    const res = await fetch('/api/tunnel', { headers: headers(false), cache: 'no-store' });
    if (res.ok) { const t = await res.json(); tunnelBtn.classList.toggle('pending', !!t.pending); }
  } catch {}
}
setInterval(pollTunnel, 120000);
pollTunnel();

/* ── Boot ───────────────────────────────────────────────────────── */
// Restore the visible conversation from the server-side transcript — the
// session itself always survives reloads (and pod restarts), only the DOM dies.
(async function loadHistory() {
  try {
    const res = await fetch('/api/history', { headers: headers(false) });
    if (res.status === 401) { onUnauthorized(); return; }
    if (!res.ok) return;
    const { messages } = await res.json();
    for (const m of messages) add(m.role === 'user' ? 'user' : 'agent', m.text);
  } catch {}
})();

refreshNav();
window.matchMedia('(min-width: 960px)').addEventListener('change', () => refreshNav());

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
